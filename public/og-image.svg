<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <radialGradient id="glow1" cx="75%" cy="30%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="25%" cy="70%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="150" r="120" fill="none" stroke="rgba(99,102,241,0.1)" stroke-width="1"/>
  <circle cx="950" cy="150" r="80" fill="none" stroke="rgba(99,102,241,0.08)" stroke-width="1"/>
  <circle cx="200" cy="500" r="90" fill="none" stroke="rgba(139,92,246,0.08)" stroke-width="1"/>

  <!-- Name -->
  <text x="100" y="240" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="700" fill="url(#textGrad)">Yuil Jeong</text>

  <!-- Nickname -->
  <text x="100" y="300" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="300" fill="rgba(99,102,241,0.7)">(Elliott)</text>

  <!-- Title -->
  <text x="100" y="380" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="500" fill="rgba(255,255,255,0.9)">From Mathematics to Data Architecture</text>
  <text x="100" y="420" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="500" fill="rgba(255,255,255,0.9)">to AI Product Builder</text>

  <!-- Tags -->
  <rect x="100" y="470" width="160" height="36" rx="18" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="180" y="494" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="rgba(99,102,241,0.9)" text-anchor="middle">Data Science</text>

  <rect x="280" y="470" width="160" height="36" rx="18" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
  <text x="360" y="494" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="rgba(139,92,246,0.9)" text-anchor="middle">AI Engineering</text>

  <rect x="460" y="470" width="180" height="36" rx="18" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="550" y="494" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="rgba(99,102,241,0.9)" text-anchor="middle">Product Builder</text>

  <!-- Bottom bar -->
  <rect x="100" y="550" width="200" height="3" rx="1.5" fill="url(#textGrad)" opacity="0.6"/>
</svg>
